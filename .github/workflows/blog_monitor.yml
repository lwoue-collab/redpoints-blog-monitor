name: Blog Monitor — Weekly GSC → Asana + Slack

on:
  schedule:
    # Runs every Monday at 8:00 AM UTC (adjust to your timezone)
    - cron: "0 8 * * 1"
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client asana python-dotenv

      - name: Write GSC service account key
        # Stored as a GitHub Actions secret — never hardcode this
        run: echo '${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}' > gsc_service_account.json

      - name: Restore GSC snapshot (previous week's data)
        uses: actions/cache@v4
        with:
          path: gsc_snapshot.json
          key: gsc-snapshot-${{ github.run_id }}
          restore-keys: gsc-snapshot-

      - name: Run monitor
        env:
          GSC_SERVICE_ACCOUNT_FILE: gsc_service_account.json
          GSC_SITE_URL:             ${{ secrets.GSC_SITE_URL }}
          ASANA_TOKEN:              ${{ secrets.ASANA_TOKEN }}
          ASANA_PROJECT_GID:        ${{ secrets.ASANA_PROJECT_GID }}
          ASANA_WORKSPACE_GID:      ${{ secrets.ASANA_WORKSPACE_GID }}
          SLACK_WEBHOOK_URL:        ${{ secrets.SLACK_WEBHOOK_URL }}
          SNAPSHOT_FILE:            gsc_snapshot.json
          POSITION_DROP_THRESHOLD:  "5"
          TRAFFIC_DROP_THRESHOLD:   "0.20"
        run: python gsc_asana_slack_monitor.py

      - name: Save updated snapshot
        uses: actions/cache@v4
        with:
          path: gsc_snapshot.json
          key: gsc-snapshot-${{ github.run_id }}
